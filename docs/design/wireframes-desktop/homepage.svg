<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none">
  <title>Wireframe Desktop - Page d'accueil EcoRide</title>
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f8f8"/>
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-family="Arial" font-size="16" fill="#333" font-weight="bold">WIREFRAME DESKTOP — Page d'accueil</text>

  <!-- NAVBAR -->
  <rect x="0" y="45" width="1200" height="60" fill="#ddd" stroke="#bbb"/>
  <text x="40" y="82" font-family="Arial" font-size="18" fill="#333" font-weight="bold">EcoRide</text>
  <text x="700" y="80" font-family="Arial" font-size="13" fill="#555">Accueil</text>
  <text x="800" y="80" font-family="Arial" font-size="13" fill="#555">Covoiturages</text>
  <text x="930" y="80" font-family="Arial" font-size="13" fill="#555">Contact</text>
  <text x="1030" y="80" font-family="Arial" font-size="13" fill="#555">Connexion</text>
  <text x="1130" y="80" font-family="Arial" font-size="13" fill="#555">Inscription</text>

  <!-- HERO SECTION -->
  <rect x="0" y="105" width="1200" height="300" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="120" y="190" font-family="Arial" font-size="28" fill="#1B5E20" font-weight="bold">Covoiturage ecologique</text>
  <text x="120" y="220" font-family="Arial" font-size="28" fill="#1B5E20" font-weight="bold">pour un avenir plus vert.</text>
  <text x="120" y="260" font-family="Arial" font-size="14" fill="#2E7D32">Partagez vos trajets et reduisez les emissions de CO2.</text>
  <rect x="120" y="280" width="140" height="40" rx="20" fill="#fff" stroke="#2E7D32"/>
  <text x="155" y="305" font-family="Arial" font-size="13" fill="#2E7D32">Decouvrir</text>
  <rect x="280" y="280" width="140" height="40" rx="20" fill="#2E7D32"/>
  <text x="310" y="305" font-family="Arial" font-size="13" fill="#fff">S'inscrire</text>

  <!-- Search Card -->
  <rect x="650" y="150" width="480" height="220" rx="12" fill="#fff" stroke="#ddd"/>
  <text x="830" y="185" text-anchor="middle" font-family="Arial" font-size="16" fill="#2E7D32" font-weight="bold">Trouver un trajet</text>
  <text x="680" y="215" font-family="Arial" font-size="11" fill="#555">Depart</text>
  <rect x="680" y="222" width="130" height="35" rx="6" fill="#f5f5f5" stroke="#ccc"/>
  <text x="700" y="244" font-family="Arial" font-size="11" fill="#999">ex. Paris</text>
  <text x="830" y="215" font-family="Arial" font-size="11" fill="#555">Arrivee</text>
  <rect x="830" y="222" width="130" height="35" rx="6" fill="#f5f5f5" stroke="#ccc"/>
  <text x="850" y="244" font-family="Arial" font-size="11" fill="#999">ex. Lyon</text>
  <text x="980" y="215" font-family="Arial" font-size="11" fill="#555">Date</text>
  <rect x="980" y="222" width="130" height="35" rx="6" fill="#f5f5f5" stroke="#ccc"/>
  <text x="1000" y="244" font-family="Arial" font-size="11" fill="#999">jj/mm/aaaa</text>
  <rect x="680" y="280" width="430" height="40" rx="20" fill="#2E7D32"/>
  <text x="845" y="305" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">Rechercher un trajet</text>

  <!-- FEATURES SECTION -->
  <rect x="50" y="425" width="340" height="130" rx="12" fill="#fff" stroke="#ddd"/>
  <circle cx="220" cy="465" r="25" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="213" y="470" font-family="Arial" font-size="16" fill="#2E7D32">🌿</text>
  <text x="220" y="505" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">100% Ecologique</text>
  <text x="220" y="525" text-anchor="middle" font-family="Arial" font-size="11" fill="#777">Vehicules electriques et hybrides</text>

  <rect x="430" y="425" width="340" height="130" rx="12" fill="#fff" stroke="#ddd"/>
  <circle cx="600" cy="465" r="25" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="593" y="470" font-family="Arial" font-size="16" fill="#2E7D32">🛡</text>
  <text x="600" y="505" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Trajet Securise</text>
  <text x="600" y="525" text-anchor="middle" font-family="Arial" font-size="11" fill="#777">Avis et notes entre utilisateurs</text>

  <rect x="810" y="425" width="340" height="130" rx="12" fill="#fff" stroke="#ddd"/>
  <circle cx="980" cy="465" r="25" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="973" y="470" font-family="Arial" font-size="16" fill="#2E7D32">💰</text>
  <text x="980" y="505" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Economique</text>
  <text x="980" y="525" text-anchor="middle" font-family="Arial" font-size="11" fill="#777">Systeme de credits simple</text>

  <!-- POPULAR CARPOOLS -->
  <text x="50" y="600" font-family="Arial" font-size="18" fill="#333" font-weight="bold">Covoiturages populaires</text>
  <text x="1050" y="600" font-family="Arial" font-size="13" fill="#2E7D32">Voir tout →</text>

  <rect x="50" y="620" width="350" height="160" rx="12" fill="#fff" stroke="#ddd"/>
  <rect x="50" y="620" width="350" height="40" rx="12" fill="#c8e6c9"/>
  <text x="70" y="645" font-family="Arial" font-size="12" fill="#1B5E20">Alice · Electrique · Eco</text>
  <text x="70" y="685" font-family="Arial" font-size="15" fill="#2E7D32" font-weight="bold">Paris → Lyon</text>
  <text x="70" y="710" font-family="Arial" font-size="11" fill="#777">Demain · 08:30 · 3 places</text>
  <text x="70" y="755" font-family="Arial" font-size="18" fill="#2E7D32" font-weight="bold">24 €</text>
  <rect x="300" y="740" width="85" height="30" rx="15" fill="#2E7D32"/>
  <text x="318" y="760" font-family="Arial" font-size="11" fill="#fff">Rechercher</text>

  <rect x="425" y="620" width="350" height="160" rx="12" fill="#fff" stroke="#ddd"/>
  <rect x="425" y="620" width="350" height="40" rx="12" fill="#c8e6c9"/>
  <text x="445" y="645" font-family="Arial" font-size="12" fill="#1B5E20">Lucas · Hybride · Eco</text>
  <text x="445" y="685" font-family="Arial" font-size="15" fill="#2E7D32" font-weight="bold">Marseille → Nice</text>
  <text x="445" y="710" font-family="Arial" font-size="11" fill="#777">Sam. · 09:00 · 2 places</text>
  <text x="445" y="755" font-family="Arial" font-size="18" fill="#2E7D32" font-weight="bold">18 €</text>
  <rect x="675" y="740" width="85" height="30" rx="15" fill="#2E7D32"/>
  <text x="693" y="760" font-family="Arial" font-size="11" fill="#fff">Rechercher</text>

  <rect x="800" y="620" width="350" height="160" rx="12" fill="#fff" stroke="#ddd"/>
  <rect x="800" y="620" width="350" height="40" rx="12" fill="#c8e6c9"/>
  <text x="820" y="645" font-family="Arial" font-size="12" fill="#1B5E20">Emma · Electrique · Eco</text>
  <text x="820" y="685" font-family="Arial" font-size="15" fill="#2E7D32" font-weight="bold">Toulouse → Bordeaux</text>
  <text x="820" y="710" font-family="Arial" font-size="11" fill="#777">Dim. · 17:15 · 1 place</text>
  <text x="820" y="755" font-family="Arial" font-size="18" fill="#2E7D32" font-weight="bold">22 €</text>
  <rect x="1050" y="740" width="85" height="30" rx="15" fill="#2E7D32"/>
  <text x="1068" y="760" font-family="Arial" font-size="11" fill="#fff">Rechercher</text>

  <!-- FOOTER -->
  <rect x="0" y="820" width="1200" height="80" fill="#1a3a1a" stroke="#0d1f12"/>
  <text x="50" y="855" font-family="Arial" font-size="14" fill="#8BC34A" font-weight="bold">EcoRide</text>
  <text x="400" y="855" font-family="Arial" font-size="11" fill="#aaa">Accueil | Covoiturages | Contact | Mentions legales</text>
  <text x="950" y="855" font-family="Arial" font-size="11" fill="#777">© 2026 EcoRide. Tous droits reserves.</text>
</svg>
