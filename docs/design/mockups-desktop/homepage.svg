  <circle cx="220" cy="468" r="30" fill="#F1F8E9"/>
  <text x="212" y="475" font-family="Arial" font-size="20" fill="#2E7D32">🌳</text>
  <text x="220" y="510" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#1B5E20" font-weight="bold">100% Ecologique</text>
  <text x="220" y="530" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#757575">Vehicules electriques et hybrides</text>
  <text x="220" y="546" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#757575">pour un impact minimal</text>

  <rect x="430" y="425" width="340" height="140" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.08))"/>
