  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#F1F8E9"/>
  <text x="600" y="18" text-anchor="middle" font-family="Montserrat, Arial" font-size="11" fill="#2E7D32" font-weight="bold">MOCKUP DESKTOP — Page d'accueil EcoRide</text>

  <!-- NAVBAR -->
  <rect x="0" y="25" width="1200" height="70" fill="url(#navGrad)"/>
  <text x="50" y="68" font-family="Montserrat, Arial" font-size="20" fill="#fff" font-weight="bold">🚗 EcoRide</text>
  <text x="680" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">🏠 Accueil</text>
  <text x="790" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">🚗 Covoiturages</text>
  <text x="930" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">✉ Contact</text>
  <text x="1020" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">🔑 Connexion</text>
  <text x="1120" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">📝 Inscription</text>

  <!-- HERO SECTION -->
  <rect x="0" y="95" width="1200" height="310" fill="url(#heroGrad)"/>
  <circle cx="1100" cy="100" r="250" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="350" r="180" fill="rgba(255,255,255,0.03)"/>

  <text x="80" y="195" font-family="Montserrat, Arial" font-size="32" fill="#fff" font-weight="bold">Covoiturage ecologique</text>
  <text x="80" y="235" font-family="Montserrat, Arial" font-size="32" fill="#fff" font-weight="bold">pour un avenir plus vert.</text>
  <text x="80" y="270" font-family="Open Sans, Arial" font-size="14" fill="rgba(255,255,255,0.9)">Partagez vos trajets, reduisez les emissions de CO₂</text>
  <text x="80" y="290" font-family="Open Sans, Arial" font-size="14" fill="rgba(255,255,255,0.9)">et economisez avec EcoRide.</text>
  <rect x="80" y="310" width="130" height="40" rx="20" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <text x="110" y="335" font-family="Open Sans, Arial" font-size="13" fill="#fff">↓ Decouvrir</text>
  <rect x="225" y="310" width="130" height="40" rx="20" fill="#fff"/>
  <text x="255" y="335" font-family="Open Sans, Arial" font-size="13" fill="#2E7D32" font-weight="bold">S'inscrire</text>

