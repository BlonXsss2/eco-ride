  <text x="592" y="475" font-family="Arial" font-size="20" fill="#2E7D32">🛡️</text>
  <text x="600" y="510" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#1B5E20" font-weight="bold">Trajet Securise</text>
  <text x="600" y="530" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#757575">Systeme d'avis et notes pour</text>
