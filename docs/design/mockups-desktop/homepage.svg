  <text x="820" y="185" text-anchor="middle" font-family="Montserrat, Arial" font-size="16" fill="#2E7D32" font-weight="bold">🔍 Trouver un trajet</text>
  <text x="650" y="215" font-family="Open Sans, Arial" font-size="11" fill="#1B5E20" font-weight="bold">📍 Depart</text>
