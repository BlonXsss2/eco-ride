  <text x="70" y="715" font-family="Montserrat, Arial" font-size="15" fill="#2E7D32" font-weight="bold">➜ Paris → Lyon</text>
  <text x="70" y="738" font-family="Open Sans, Arial" font-size="11" fill="#757575">🕐 Demain · 08:30 · 3 places</text>
