  <text x="445" y="675" font-family="Open Sans, Arial" font-size="12" fill="#fff" font-weight="bold">👤 Lucas · Hybride</text>
  <text x="705" y="675" font-family="Open Sans, Arial" font-size="10" fill="rgba(255,255,255,0.9)">⚡ Eco</text>
  <text x="445" y="715" font-family="Montserrat, Arial" font-size="15" fill="#2E7D32" font-weight="bold">➜ Marseille → Nice</text>
  <text x="445" y="738" font-family="Open Sans, Arial" font-size="11" fill="#757575">🕐 Sam. · 09:00 · 2 places</text>
  <text x="445" y="785" font-family="Montserrat, Arial" font-size="20" fill="#2E7D32" font-weight="bold">18 €</text>
  <rect x="675" y="770" width="88" height="30" rx="15" fill="url(#btnGrad)"/>
  <text x="691" y="790" font-family="Open Sans, Arial" font-size="11" fill="#fff" font-weight="bold">Rechercher</text>

  <!-- Card 3 -->
  <rect x="800" y="650" width="350" height="155" rx="16" fill="#fff" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.08))"/>
  <rect x="800" y="650" width="350" height="40" rx="16" fill="url(#btnGrad)"/>
  <text x="820" y="675" font-family="Open Sans, Arial" font-size="12" fill="#fff" font-weight="bold">👤 Emma · Electrique</text>
  <text x="1080" y="675" font-family="Open Sans, Arial" font-size="10" fill="rgba(255,255,255,0.9)">⚡ Eco</text>
  <text x="820" y="715" font-family="Montserrat, Arial" font-size="15" fill="#2E7D32" font-weight="bold">➜ Toulouse → Bordeaux</text>
  <text x="820" y="738" font-family="Open Sans, Arial" font-size="11" fill="#757575">🕐 Dim. · 17:15 · 1 place</text>
  <text x="820" y="785" font-family="Montserrat, Arial" font-size="20" fill="#2E7D32" font-weight="bold">22 €</text>
  <rect x="1050" y="770" width="88" height="30" rx="15" fill="url(#btnGrad)"/>
  <text x="1066" y="790" font-family="Open Sans, Arial" font-size="11" fill="#fff" font-weight="bold">Rechercher</text>

  <!-- FOOTER -->
  <rect x="0" y="830" width="1200" height="70" fill="url(#footerGrad)"/>
  <text x="50" y="865" font-family="Montserrat, Arial" font-size="14" fill="#8BC34A" font-weight="bold">🚗 EcoRide</text>
  <text x="350" y="865" font-family="Open Sans, Arial" font-size="11" fill="rgba(255,255,255,0.6)">Accueil | Covoiturages | Contact | Mentions legales | Confidentialite</text>
  <text x="950" y="865" font-family="Open Sans, Arial" font-size="11" fill="rgba(255,255,255,0.4)">© 2026 EcoRide. Tous droits reserves.</text>
</svg>
