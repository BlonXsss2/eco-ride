  <rect x="810" y="425" width="340" height="140" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.08))"/>
  <circle cx="980" cy="468" r="30" fill="#F1F8E9"/>
  <text x="972" y="475" font-family="Arial" font-size="20" fill="#2E7D32">💰</text>
  <text x="980" y="510" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#1B5E20" font-weight="bold">Economique</text>
  <text x="980" y="530" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#757575">Systeme de credits simple</text>
  <text x="980" y="546" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#757575">et transparent</text>

