  <text x="665" y="246" font-family="Open Sans, Arial" font-size="11" fill="#aaa">ex. Paris</text>
  <text x="810" y="215" font-family="Open Sans, Arial" font-size="11" fill="#1B5E20" font-weight="bold">📌 Arrivee</text>
  <rect x="810" y="222" width="140" height="38" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="825" y="246" font-family="Open Sans, Arial" font-size="11" fill="#aaa">ex. Lyon</text>
  <text x="970" y="215" font-family="Open Sans, Arial" font-size="11" fill="#1B5E20" font-weight="bold">📅 Date</text>
  <rect x="970" y="222" width="140" height="38" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="985" y="246" font-family="Open Sans, Arial" font-size="11" fill="#aaa">jj/mm/aaaa</text>
  <rect x="650" y="280" width="460" height="42" rx="21" fill="url(#btnGrad)" filter="drop-shadow(0 4px 15px rgba(46,125,50,0.3))"/>
  <text x="830" y="307" text-anchor="middle" font-family="Open Sans, Arial" font-size="14" fill="#fff" font-weight="bold">🔍 Rechercher un trajet</text>

