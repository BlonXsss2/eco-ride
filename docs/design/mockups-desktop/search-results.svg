  <text x="908" y="395" font-family="Montserrat, Arial" font-size="18" fill="#2E7D32" font-weight="bold">24.00 € / place</text>
  <rect x="1060" y="380" width="76" height="28" rx="14" fill="url(#btnG)"/>
