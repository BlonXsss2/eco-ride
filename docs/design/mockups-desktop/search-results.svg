  <rect x="890" y="210" width="260" height="210" rx="16" fill="#fff" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <rect x="890" y="210" width="260" height="42" rx="16" fill="url(#btnG)"/>
  <text x="908" y="236" font-family="Open Sans, Arial" font-size="11" fill="#fff" font-weight="bold">Alice · Petrol</text>
  <text x="908" y="280" font-family="Montserrat, Arial" font-size="16" fill="#2E7D32" font-weight="bold">Lyon → Paris</text>
