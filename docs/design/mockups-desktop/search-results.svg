  <text x="628" y="236" font-family="Open Sans, Arial" font-size="11" fill="#fff" font-weight="bold">Lucas · Hybrid · ★ 4.0</text>
  <text x="838" y="236" font-family="Open Sans, Arial" font-size="9" fill="rgba(255,255,255,0.8)">⚡Eco</text>
  <text x="628" y="280" font-family="Montserrat, Arial" font-size="16" fill="#2E7D32" font-weight="bold">Paris → Lyon</text>
  <text x="628" y="300" font-family="Open Sans, Arial" font-size="11" fill="#757575">27/02 · 14:00 · 4 places</text>
