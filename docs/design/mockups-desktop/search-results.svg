    <linearGradient id="btnG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
    <linearGradient id="footG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1f12"/><stop offset="100%" stop-color="#0a2e10"/></linearGradient>
  </defs>
  <rect width="1200" height="900" fill="#F1F8E9"/>
