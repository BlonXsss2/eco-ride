  <text x="628" y="395" font-family="Montserrat, Arial" font-size="18" fill="#2E7D32" font-weight="bold">24.00 € / place</text>
  <rect x="780" y="380" width="76" height="28" rx="14" fill="url(#btnG)"/>
  <text x="797" y="399" font-family="Open Sans, Arial" font-size="11" fill="#fff" font-weight="bold">Details</text>

