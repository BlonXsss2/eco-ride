<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" fill="none">
  <title>Mockup Desktop - Details du covoiturage EcoRide</title>
  <defs>
    <linearGradient id="nG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#1B5E20"/></linearGradient>
    <linearGradient id="bG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
    <linearGradient id="fG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1f12"/><stop offset="100%" stop-color="#0a2e10"/></linearGradient>
  </defs>
  <rect width="1200" height="850" fill="#F1F8E9"/>
  <text x="600" y="18" text-anchor="middle" font-family="Montserrat, Arial" font-size="11" fill="#2E7D32" font-weight="bold">MOCKUP DESKTOP — Details du covoiturage</text>

  <!-- NAVBAR -->
  <rect x="0" y="25" width="1200" height="70" fill="url(#nG)"/>
  <text x="50" y="68" font-family="Montserrat, Arial" font-size="20" fill="#fff" font-weight="bold">🚗 EcoRide</text>
  <text x="680" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">Accueil</text>
  <text x="800" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">Covoiturages</text>
  <text x="930" y="65" font-family="Open Sans, Arial" font-size="13" fill="rgba(255,255,255,0.9)">Mon Profil</text>

  <!-- Back -->
  <rect x="50" y="115" width="110" height="30" rx="6" fill="#fff" stroke="#ccc"/>
  <text x="68" y="135" font-family="Open Sans, Arial" font-size="12" fill="#555">← Retour</text>

  <!-- Trip Info Card -->
  <rect x="50" y="165" width="720" height="180" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.08))"/>
  <rect x="50" y="165" width="720" height="48" rx="16" fill="url(#bG)"/>
  <text x="75" y="196" font-family="Montserrat, Arial" font-size="18" fill="#fff" font-weight="bold">Paris → Lyon</text>
  <rect x="690" y="175" width="60" height="26" rx="13" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)"/>
  <text x="700" y="193" font-family="Open Sans, Arial" font-size="11" fill="#fff">Eco ★</text>
  <text x="75" y="245" font-family="Open Sans, Arial" font-size="13" fill="#1B5E20"><tspan font-weight="bold">Date</tspan></text>
  <text x="220" y="245" font-family="Open Sans, Arial" font-size="13" fill="#333">26/02/2026</text>
  <text x="75" y="270" font-family="Open Sans, Arial" font-size="13" fill="#1B5E20"><tspan font-weight="bold">Heure de depart</tspan></text>
  <text x="220" y="270" font-family="Open Sans, Arial" font-size="13" fill="#333">08:30</text>
  <text x="75" y="295" font-family="Open Sans, Arial" font-size="13" fill="#1B5E20"><tspan font-weight="bold">Prix par place</tspan></text>
  <text x="220" y="295" font-family="Open Sans, Arial" font-size="13" fill="#2E7D32" font-weight="bold">24.00 €</text>
  <text x="75" y="320" font-family="Open Sans, Arial" font-size="13" fill="#1B5E20"><tspan font-weight="bold">Places</tspan></text>
  <text x="220" y="320" font-family="Open Sans, Arial" font-size="13" fill="#333">3 / 4</text>

  <!-- Vehicle Card -->
  <rect x="50" y="365" width="720" height="120" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.08))"/>
  <rect x="50" y="365" width="720" height="48" rx="16" fill="url(#bG)"/>
  <text x="75" y="396" font-family="Montserrat, Arial" font-size="18" fill="#fff" font-weight="bold">Vehicule</text>
  <text x="700" y="396" font-family="Open Sans, Arial" font-size="11" fill="rgba(255,255,255,0.8)">Electric</text>
  <text x="75" y="440" font-family="Open Sans, Arial" font-size="13" fill="#333">Tesla Model 3 · White · AB-123-CD</text>

  <!-- Reviews -->
  <rect x="50" y="505" width="720" height="160" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.08))"/>
  <rect x="50" y="505" width="720" height="48" rx="16" fill="url(#bG)"/>
  <text x="75" y="536" font-family="Montserrat, Arial" font-size="18" fill="#fff" font-weight="bold">Avis sur le conducteur</text>
  <text x="75" y="585" font-family="Montserrat, Arial" font-size="32" fill="#2E7D32" font-weight="bold">5.0</text>
  <text x="135" y="585" font-family="Arial" font-size="18" fill="#f9a825">★★★★★</text>
  <text x="235" y="585" font-family="Open Sans, Arial" font-size="12" fill="#757575">1 avis valide</text>
  <rect x="75" y="600" width="680" height="52" rx="8" fill="#f8f9fa"/>
  <text x="90" y="620" font-family="Arial" font-size="13" fill="#f9a825">★★★★★</text>
  <text x="165" y="620" font-family="Open Sans, Arial" font-size="12" fill="#333" font-weight="bold">Emma</text>
  <text x="660" y="620" font-family="Open Sans, Arial" font-size="11" fill="#999">18/02/2026</text>
  <text x="90" y="640" font-family="Open Sans, Arial" font-size="11" fill="#555">Excellent trajet ! Tres confortable et ecologique.</text>

  <!-- RIGHT: Driver + Booking -->
  <rect x="800" y="165" width="350" height="250" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.08))"/>
  <rect x="800" y="165" width="350" height="48" rx="16" fill="url(#bG)"/>
  <text x="930" y="196" font-family="Montserrat, Arial" font-size="18" fill="#fff" font-weight="bold">Conducteur</text>
  <circle cx="975" cy="260" r="32" fill="#2E7D32"/>
  <text x="968" y="268" font-family="Montserrat, Arial" font-size="22" fill="#fff" font-weight="bold">A</text>
  <text x="975" y="308" text-anchor="middle" font-family="Montserrat, Arial" font-size="16" fill="#1B5E20" font-weight="bold">Alice</text>
  <text x="975" y="328" text-anchor="middle" font-family="Arial" font-size="14" fill="#f9a825">★★★★★</text>
  <text x="975" y="345" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#757575">(5.0)</text>
  <line x1="820" y1="360" x2="1130" y2="360" stroke="#f0f0f0"/>
  <rect x="845" y="375" width="110" height="24" rx="12" fill="#ffebee"/>
  <text x="860" y="392" font-family="Open Sans, Arial" font-size="10" fill="#c62828">✗ Non fumeur</text>
  <rect x="965" y="375" width="130" height="24" rx="12" fill="#e8f5e9"/>
  <text x="980" y="392" font-family="Open Sans, Arial" font-size="10" fill="#2e7d32">✓ Animaux acceptes</text>

  <!-- Booking -->
  <rect x="800" y="435" width="350" height="150" rx="16" fill="#f8f9fa" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <text x="975" y="475" text-anchor="middle" font-family="Montserrat, Arial" font-size="28" fill="#2E7D32" font-weight="bold">24.00 €</text>
  <text x="975" y="498" text-anchor="middle" font-family="Open Sans, Arial" font-size="12" fill="#757575">/ place</text>
  <text x="975" y="525" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#555">Credits: 20.00 € · Cout: 1 credit</text>
  <rect x="845" y="540" width="260" height="36" rx="18" fill="url(#bG)" filter="drop-shadow(0 4px 15px rgba(46,125,50,0.3))"/>
  <text x="975" y="563" text-anchor="middle" font-family="Open Sans, Arial" font-size="14" fill="#fff" font-weight="bold">Participer</text>

  <!-- FOOTER -->
  <rect x="0" y="780" width="1200" height="70" fill="url(#fG)"/>
  <text x="50" y="818" font-family="Montserrat, Arial" font-size="14" fill="#8BC34A" font-weight="bold">🚗 EcoRide</text>
  <text x="950" y="818" font-family="Open Sans, Arial" font-size="11" fill="rgba(255,255,255,0.4)">© 2026 EcoRide</text>
</svg>
