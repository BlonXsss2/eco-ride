<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" fill="none">
  <title>Wireframe Mobile - Page d'accueil EcoRide</title>
  <rect width="375" height="812" fill="#f8f8f8"/>
  <text x="187" y="20" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">WIREFRAME MOBILE (375px) — Accueil</text>

  <!-- Status bar -->
  <rect x="0" y="28" width="375" height="20" fill="#eee"/>
  <text x="187" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">9:41</text>

  <!-- NAVBAR -->
  <rect x="0" y="48" width="375" height="50" fill="#ddd" stroke="#bbb"/>
  <text x="20" y="78" font-family="Arial" font-size="16" fill="#333" font-weight="bold">EcoRide</text>
  <rect x="330" y="62" width="30" height="3" fill="#555"/>
  <rect x="330" y="69" width="30" height="3" fill="#555"/>
  <rect x="330" y="76" width="30" height="3" fill="#555"/>

  <!-- HERO -->
  <rect x="0" y="98" width="375" height="200" fill="#c8e6c9"/>
  <text x="20" y="140" font-family="Arial" font-size="18" fill="#1B5E20" font-weight="bold">Covoiturage</text>
  <text x="20" y="162" font-family="Arial" font-size="18" fill="#1B5E20" font-weight="bold">ecologique</text>
  <text x="20" y="190" font-family="Arial" font-size="11" fill="#2E7D32">Partagez vos trajets et reduisez</text>
  <text x="20" y="205" font-family="Arial" font-size="11" fill="#2E7D32">les emissions de CO2.</text>
  <rect x="20" y="220" width="100" height="30" rx="15" fill="#fff" stroke="#2E7D32"/>
  <text x="38" y="240" font-family="Arial" font-size="10" fill="#2E7D32">Decouvrir</text>
  <rect x="130" y="220" width="100" height="30" rx="15" fill="#2E7D32"/>
  <text x="148" y="240" font-family="Arial" font-size="10" fill="#fff">S'inscrire</text>

  <!-- SEARCH CARD -->
  <rect x="15" y="310" width="345" height="190" rx="10" fill="#fff" stroke="#ddd"/>
  <text x="187" y="340" text-anchor="middle" font-family="Arial" font-size="14" fill="#2E7D32" font-weight="bold">Trouver un trajet</text>
  <text x="30" y="365" font-family="Arial" font-size="10" fill="#555">Depart</text>
  <rect x="30" y="372" width="315" height="28" rx="5" fill="#f5f5f5" stroke="#ccc"/>
  <text x="40" y="391" font-family="Arial" font-size="10" fill="#999">ex. Paris</text>
  <text x="30" y="415" font-family="Arial" font-size="10" fill="#555">Arrivee</text>
  <rect x="30" y="422" width="315" height="28" rx="5" fill="#f5f5f5" stroke="#ccc"/>
  <text x="40" y="441" font-family="Arial" font-size="10" fill="#999">ex. Lyon</text>
  <rect x="30" y="462" width="315" height="28" rx="14" fill="#2E7D32"/>
  <text x="187" y="481" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Rechercher un trajet</text>

  <!-- FEATURES -->
  <rect x="15" y="520" width="345" height="65" rx="8" fill="#fff" stroke="#ddd"/>
  <circle cx="48" cy="552" r="18" fill="#e8f5e9"/>
  <text x="42" y="557" font-family="Arial" font-size="12" fill="#2E7D32">🌿</text>
  <text x="78" y="546" font-family="Arial" font-size="12" fill="#333" font-weight="bold">100% Ecologique</text>
  <text x="78" y="565" font-family="Arial" font-size="9" fill="#777">Vehicules electriques et hybrides</text>

  <rect x="15" y="595" width="345" height="65" rx="8" fill="#fff" stroke="#ddd"/>
  <circle cx="48" cy="627" r="18" fill="#e8f5e9"/>
  <text x="42" y="632" font-family="Arial" font-size="12" fill="#2E7D32">🛡</text>
  <text x="78" y="621" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Trajet Securise</text>
  <text x="78" y="640" font-family="Arial" font-size="9" fill="#777">Avis et notes entre utilisateurs</text>

  <!-- POPULAR CARPOOL (1 card visible) -->
  <text x="20" y="690" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Covoiturages populaires</text>
  <rect x="15" y="700" width="345" height="80" rx="8" fill="#fff" stroke="#ddd"/>
  <rect x="15" y="700" width="345" height="28" rx="8" fill="#c8e6c9"/>
  <text x="25" y="719" font-family="Arial" font-size="10" fill="#1B5E20">Alice · Electrique · Eco</text>
  <text x="25" y="748" font-family="Arial" font-size="13" fill="#2E7D32" font-weight="bold">Paris → Lyon</text>
  <text x="25" y="768" font-family="Arial" font-size="10" fill="#777">Demain · 08:30 · 3 places</text>
  <text x="280" y="768" font-family="Arial" font-size="14" fill="#2E7D32" font-weight="bold">24 €</text>

  <!-- Bottom indicator -->
  <rect x="140" y="798" width="95" height="4" rx="2" fill="#ccc"/>
</svg>
