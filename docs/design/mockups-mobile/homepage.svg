<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" fill="none">
  <title>Mockup Mobile - Page d'accueil EcoRide</title>
  <defs>
    <linearGradient id="hG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="50%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
    <linearGradient id="nG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#1B5E20"/></linearGradient>
    <linearGradient id="bG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
  </defs>
  <rect width="375" height="812" fill="#F1F8E9"/>
  <text x="187" y="16" text-anchor="middle" font-family="Montserrat, Arial" font-size="8" fill="#2E7D32" font-weight="bold">MOCKUP MOBILE (375px) — Accueil</text>

  <!-- Status bar -->
  <rect x="0" y="22" width="375" height="20" fill="#1B5E20"/>
  <text x="187" y="36" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">9:41</text>

  <!-- NAVBAR -->
  <rect x="0" y="42" width="375" height="50" fill="url(#nG)"/>
  <text x="15" y="73" font-family="Montserrat, Arial" font-size="16" fill="#fff" font-weight="bold">🚗 EcoRide</text>
  <rect x="330" y="56" width="28" height="3" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="330" y="63" width="28" height="3" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="330" y="70" width="28" height="3" rx="1" fill="rgba(255,255,255,0.8)"/>

  <!-- HERO -->
  <rect x="0" y="92" width="375" height="195" fill="url(#hG)"/>
  <circle cx="350" cy="100" r="120" fill="rgba(255,255,255,0.04)"/>
  <text x="20" y="135" font-family="Montserrat, Arial" font-size="20" fill="#fff" font-weight="bold">Covoiturage</text>
  <text x="20" y="160" font-family="Montserrat, Arial" font-size="20" fill="#fff" font-weight="bold">ecologique</text>
  <text x="20" y="185" font-family="Open Sans, Arial" font-size="11" fill="rgba(255,255,255,0.9)">Reduisez vos emissions de CO₂</text>
  <rect x="20" y="200" width="100" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
  <text x="35" y="220" font-family="Open Sans, Arial" font-size="10" fill="#fff">↓ Decouvrir</text>
  <rect x="130" y="200" width="100" height="30" rx="15" fill="#fff"/>
  <text x="148" y="220" font-family="Open Sans, Arial" font-size="10" fill="#2E7D32" font-weight="bold">S'inscrire</text>

  <!-- SEARCH CARD -->
  <rect x="15" y="300" width="345" height="185" rx="16" fill="#fff" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.1))"/>
  <text x="187" y="330" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#2E7D32" font-weight="bold">🔍 Trouver un trajet</text>
  <text x="30" y="354" font-family="Open Sans, Arial" font-size="10" fill="#1B5E20" font-weight="bold">📍 Depart</text>
  <rect x="30" y="360" width="315" height="30" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="42" y="380" font-family="Open Sans, Arial" font-size="10" fill="#aaa">ex. Paris</text>
  <text x="30" y="406" font-family="Open Sans, Arial" font-size="10" fill="#1B5E20" font-weight="bold">📌 Arrivee</text>
  <rect x="30" y="412" width="315" height="30" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="42" y="432" font-family="Open Sans, Arial" font-size="10" fill="#aaa">ex. Lyon</text>
  <rect x="30" y="454" width="315" height="28" rx="14" fill="url(#bG)" filter="drop-shadow(0 4px 15px rgba(46,125,50,0.3))"/>
  <text x="187" y="473" text-anchor="middle" font-family="Open Sans, Arial" font-size="11" fill="#fff" font-weight="bold">🔍 Rechercher</text>

  <!-- FEATURES -->
  <rect x="15" y="505" width="345" height="60" rx="12" fill="#fff" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <circle cx="45" cy="535" r="16" fill="#F1F8E9"/>
  <text x="39" y="540" font-family="Arial" font-size="12" fill="#2E7D32">🌳</text>
  <text x="72" y="530" font-family="Montserrat, Arial" font-size="12" fill="#1B5E20" font-weight="bold">100% Ecologique</text>
  <text x="72" y="548" font-family="Open Sans, Arial" font-size="9" fill="#757575">Vehicules electriques et hybrides</text>

  <rect x="15" y="575" width="345" height="60" rx="12" fill="#fff" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <circle cx="45" cy="605" r="16" fill="#F1F8E9"/>
  <text x="39" y="610" font-family="Arial" font-size="12" fill="#2E7D32">🛡️</text>
  <text x="72" y="600" font-family="Montserrat, Arial" font-size="12" fill="#1B5E20" font-weight="bold">Trajet Securise</text>
  <text x="72" y="618" font-family="Open Sans, Arial" font-size="9" fill="#757575">Avis et notes entre utilisateurs</text>

  <!-- POPULAR -->
  <text x="15" y="665" font-family="Montserrat, Arial" font-size="14" fill="#1B5E20" font-weight="bold">⭐ Populaires</text>
  <rect x="15" y="678" width="345" height="80" rx="12" fill="#fff" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <rect x="15" y="678" width="345" height="28" rx="12" fill="url(#bG)"/>
  <text x="28" y="697" font-family="Open Sans, Arial" font-size="10" fill="#fff" font-weight="bold">Alice · Electrique · ⚡Eco</text>
  <text x="28" y="725" font-family="Montserrat, Arial" font-size="13" fill="#2E7D32" font-weight="bold">Paris → Lyon</text>
  <text x="28" y="743" font-family="Open Sans, Arial" font-size="10" fill="#757575">Demain · 08:30 · 3 places</text>
  <text x="290" y="743" font-family="Montserrat, Arial" font-size="16" fill="#2E7D32" font-weight="bold">24 €</text>

  <!-- Footer -->
  <rect x="0" y="772" width="375" height="40" fill="#0d1f12"/>
  <text x="187" y="795" text-anchor="middle" font-family="Open Sans, Arial" font-size="9" fill="rgba(255,255,255,0.4)">© 2026 EcoRide</text>
</svg>
