<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" fill="none">
  <title>MCD - Modele Conceptuel de Donnees EcoRide</title>
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#fafafa" rx="8"/>
  <text x="550" y="35" text-anchor="middle" font-family="Montserrat, Arial" font-size="20" fill="#1B5E20" font-weight="bold">MCD - Modele Conceptuel de Donnees EcoRide</text>
  <text x="550" y="55" text-anchor="middle" font-family="Open Sans, Arial" font-size="12" fill="#757575">Relations entre les entites de la base de donnees MySQL</text>

  <!-- ====================== -->
  <!-- TABLE: USERS -->
  <!-- ====================== -->
  <rect x="50" y="100" width="250" height="330" rx="8" fill="#fff" stroke="#2E7D32" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.1))"/>
  <rect x="50" y="100" width="250" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="175" y="123" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#fff" font-weight="bold">USERS</text>
  <text x="65" y="155" font-family="monospace" font-size="11" fill="#333">🔑 id              INT PK AI</text>
  <line x1="60" y1="162" x2="290" y2="162" stroke="#e0e0e0"/>
  <text x="65" y="178" font-family="monospace" font-size="11" fill="#333">   email           VARCHAR(191)</text>
  <text x="65" y="195" font-family="monospace" font-size="11" fill="#333">   password        VARCHAR(255)</text>
  <text x="65" y="212" font-family="monospace" font-size="11" fill="#333">   pseudo          VARCHAR(50)</text>
  <text x="65" y="229" font-family="monospace" font-size="11" fill="#333">   role            ENUM</text>
  <text x="65" y="246" font-family="monospace" font-size="11" fill="#333">   role_selection   ENUM</text>
  <text x="65" y="263" font-family="monospace" font-size="11" fill="#333">   smoking_allowed TINYINT</text>
  <text x="65" y="280" font-family="monospace" font-size="11" fill="#333">   pets_allowed    TINYINT</text>
  <text x="65" y="297" font-family="monospace" font-size="11" fill="#333">   credits         DECIMAL(8,2)</text>
  <text x="65" y="314" font-family="monospace" font-size="11" fill="#333">   suspended       TINYINT</text>
  <text x="65" y="331" font-family="monospace" font-size="11" fill="#333">   created_at      TIMESTAMP</text>
  <text x="65" y="348" font-family="monospace" font-size="11" fill="#333">   updated_at      DATETIME</text>
  <!-- Unique -->
  <text x="65" y="380" font-family="monospace" font-size="9" fill="#2E7D32">UNIQUE: email, pseudo</text>
  <text x="65" y="395" font-family="monospace" font-size="9" fill="#2E7D32">INDEX: role, suspended</text>

  <!-- ====================== -->
  <!-- TABLE: VEHICLES -->
  <!-- ====================== -->
  <rect x="420" y="80" width="250" height="250" rx="8" fill="#fff" stroke="#2E7D32" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.1))"/>
  <rect x="420" y="80" width="250" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="545" y="103" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#fff" font-weight="bold">VEHICLES</text>
  <text x="435" y="135" font-family="monospace" font-size="11" fill="#333">🔑 id              INT PK AI</text>
  <line x1="430" y1="142" x2="660" y2="142" stroke="#e0e0e0"/>
  <text x="435" y="158" font-family="monospace" font-size="11" fill="#e65100">🔗 user_id         FK → users</text>
  <text x="435" y="175" font-family="monospace" font-size="11" fill="#333">   brand           VARCHAR(100)</text>
  <text x="435" y="192" font-family="monospace" font-size="11" fill="#333">   model           VARCHAR(100)</text>
  <text x="435" y="209" font-family="monospace" font-size="11" fill="#333">   energy_type     ENUM</text>
  <text x="435" y="226" font-family="monospace" font-size="11" fill="#333">   seats           TINYINT</text>
  <text x="435" y="243" font-family="monospace" font-size="11" fill="#333">   color           VARCHAR(50)</text>
  <text x="435" y="260" font-family="monospace" font-size="11" fill="#333">   license_plate   VARCHAR(20)</text>
  <text x="435" y="277" font-family="monospace" font-size="11" fill="#333">   registration_date DATE</text>
  <text x="435" y="294" font-family="monospace" font-size="11" fill="#333">   created_at      TIMESTAMP</text>
  <text x="435" y="315" font-family="monospace" font-size="9" fill="#2E7D32">ON DELETE CASCADE</text>

  <!-- ====================== -->
  <!-- TABLE: CARPOOLS -->
  <!-- ====================== -->
  <rect x="780" y="80" width="270" height="280" rx="8" fill="#fff" stroke="#2E7D32" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.1))"/>
  <rect x="780" y="80" width="270" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="915" y="103" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#fff" font-weight="bold">CARPOOLS</text>
  <text x="795" y="135" font-family="monospace" font-size="11" fill="#333">🔑 id               INT PK AI</text>
  <line x1="790" y1="142" x2="1040" y2="142" stroke="#e0e0e0"/>
  <text x="795" y="158" font-family="monospace" font-size="11" fill="#e65100">🔗 driver_id        FK → users</text>
  <text x="795" y="175" font-family="monospace" font-size="11" fill="#e65100">🔗 vehicle_id       FK → vehicles</text>
  <text x="795" y="192" font-family="monospace" font-size="11" fill="#333">   from_city        VARCHAR(120)</text>
  <text x="795" y="209" font-family="monospace" font-size="11" fill="#333">   to_city          VARCHAR(120)</text>
  <text x="795" y="226" font-family="monospace" font-size="11" fill="#333">   departure_datetime DATETIME</text>
  <text x="795" y="243" font-family="monospace" font-size="11" fill="#333">   price            DECIMAL(8,2)</text>
  <text x="795" y="260" font-family="monospace" font-size="11" fill="#333">   total_seats      TINYINT</text>
  <text x="795" y="277" font-family="monospace" font-size="11" fill="#333">   seats_available  TINYINT</text>
  <text x="795" y="294" font-family="monospace" font-size="11" fill="#333">   is_eco           TINYINT</text>
  <text x="795" y="311" font-family="monospace" font-size="11" fill="#333">   created_at       TIMESTAMP</text>
  <text x="795" y="340" font-family="monospace" font-size="9" fill="#2E7D32">ON DELETE RESTRICT (driver)</text>
  <text x="795" y="352" font-family="monospace" font-size="9" fill="#2E7D32">ON DELETE SET NULL (vehicle)</text>

  <!-- ====================== -->
  <!-- TABLE: BOOKINGS -->
  <!-- ====================== -->
  <rect x="420" y="420" width="250" height="230" rx="8" fill="#fff" stroke="#2E7D32" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.1))"/>
  <rect x="420" y="420" width="250" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="545" y="443" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#fff" font-weight="bold">BOOKINGS</text>
  <text x="435" y="475" font-family="monospace" font-size="11" fill="#333">🔑 id             INT PK AI</text>
  <line x1="430" y1="482" x2="660" y2="482" stroke="#e0e0e0"/>
  <text x="435" y="498" font-family="monospace" font-size="11" fill="#e65100">🔗 carpool_id     FK → carpools</text>
  <text x="435" y="515" font-family="monospace" font-size="11" fill="#e65100">🔗 passenger_id   FK → users</text>
  <text x="435" y="532" font-family="monospace" font-size="11" fill="#333">   seat_count     TINYINT</text>
  <text x="435" y="549" font-family="monospace" font-size="11" fill="#333">   status         ENUM</text>
  <text x="435" y="566" font-family="monospace" font-size="11" fill="#333">   created_at     TIMESTAMP</text>
  <text x="435" y="583" font-family="monospace" font-size="11" fill="#333">   updated_at     DATETIME</text>
  <text x="435" y="608" font-family="monospace" font-size="9" fill="#2E7D32">UNIQUE: (carpool_id, passenger_id)</text>
  <text x="435" y="620" font-family="monospace" font-size="9" fill="#2E7D32">ON DELETE CASCADE (carpool)</text>

  <!-- ====================== -->
  <!-- TABLE: REVIEWS -->
  <!-- ====================== -->
  <rect x="780" y="420" width="270" height="280" rx="8" fill="#fff" stroke="#2E7D32" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.1))"/>
  <rect x="780" y="420" width="270" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="915" y="443" text-anchor="middle" font-family="Montserrat, Arial" font-size="14" fill="#fff" font-weight="bold">REVIEWS</text>
  <text x="795" y="475" font-family="monospace" font-size="11" fill="#333">🔑 id             INT PK AI</text>
  <line x1="790" y1="482" x2="1040" y2="482" stroke="#e0e0e0"/>
  <text x="795" y="498" font-family="monospace" font-size="11" fill="#e65100">🔗 carpool_id     FK → carpools</text>
  <text x="795" y="515" font-family="monospace" font-size="11" fill="#e65100">🔗 passenger_id   FK → users</text>
  <text x="795" y="532" font-family="monospace" font-size="11" fill="#333">   rating         TINYINT</text>
  <text x="795" y="549" font-family="monospace" font-size="11" fill="#333">   comment        TEXT</text>
  <text x="795" y="566" font-family="monospace" font-size="11" fill="#333">   validated      TINYINT</text>
  <text x="795" y="583" font-family="monospace" font-size="11" fill="#333">   rejected       TINYINT</text>
  <text x="795" y="600" font-family="monospace" font-size="11" fill="#e65100">🔗 validated_by   FK → users</text>
  <text x="795" y="617" font-family="monospace" font-size="11" fill="#333">   validated_at   TIMESTAMP</text>
  <text x="795" y="634" font-family="monospace" font-size="11" fill="#333">   created_at     TIMESTAMP</text>
  <text x="795" y="660" font-family="monospace" font-size="9" fill="#2E7D32">UNIQUE: (carpool_id, passenger_id)</text>
  <text x="795" y="672" font-family="monospace" font-size="9" fill="#2E7D32">ON DELETE CASCADE (carpool)</text>

  <!-- ====================== -->
  <!-- RELATIONSHIPS (arrows) -->
  <!-- ====================== -->

  <!-- USERS → VEHICLES (1-N) -->
  <line x1="300" y1="200" x2="420" y2="160" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="168" font-family="monospace" font-size="10" fill="#e65100" font-weight="bold">1 — N</text>
  <polygon points="415,158 420,163 415,168" fill="#e65100"/>

  <!-- USERS → CARPOOLS (1-N) via driver_id -->
  <line x1="300" y1="160" x2="780" y2="158" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="530" y="150" font-family="monospace" font-size="10" fill="#e65100" font-weight="bold">1 — N (driver)</text>
  <polygon points="775,155 780,160 775,165" fill="#e65100"/>

  <!-- VEHICLES → CARPOOLS (1-N) -->
  <line x1="670" y1="200" x2="780" y2="175" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="700" y="178" font-family="monospace" font-size="10" fill="#e65100" font-weight="bold">1 — N</text>
  <polygon points="775,173 780,178 775,183" fill="#e65100"/>

  <!-- USERS → BOOKINGS (1-N) via passenger_id -->
  <line x1="250" y1="430" x2="420" y2="515" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="290" y="485" font-family="monospace" font-size="10" fill="#e65100" font-weight="bold">1 — N (passager)</text>
  <polygon points="415,512 420,517 415,522" fill="#e65100"/>

  <!-- CARPOOLS → BOOKINGS (1-N) -->
  <line x1="850" y1="360" x2="670" y2="498" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="730" y="415" font-family="monospace" font-size="10" fill="#e65100" font-weight="bold">1 — N</text>
  <polygon points="675,495 670,500 675,505" fill="#e65100"/>

  <!-- CARPOOLS → REVIEWS (1-N) -->
  <line x1="915" y1="360" x2="915" y2="420" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="925" y="395" font-family="monospace" font-size="10" fill="#e65100" font-weight="bold">1 — N</text>
  <polygon points="912,415 917,420 922,415" fill="#e65100"/>

  <!-- USERS → REVIEWS (1-N) via passenger_id -->
  <line x1="175" y1="430" x2="780" y2="515" stroke="#757575" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="505" font-family="monospace" font-size="9" fill="#757575">1 — N (passager/avis)</text>

  <!-- USERS → REVIEWS via validated_by -->
  <line x1="175" y1="430" x2="780" y2="600" stroke="#757575" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="400" y="545" font-family="monospace" font-size="9" fill="#999">1 — N (employee/validation)</text>

  <!-- LEGEND -->
  <rect x="50" y="680" width="400" height="55" rx="6" fill="#f0f0f0" stroke="#ddd"/>
  <text x="65" y="700" font-family="Montserrat, Arial" font-size="11" fill="#333" font-weight="bold">Legende :</text>
  <text x="65" y="720" font-family="monospace" font-size="10" fill="#333">🔑 = Cle primaire (PK)</text>
  <text x="220" y="720" font-family="monospace" font-size="10" fill="#e65100">🔗 = Cle etrangere (FK)</text>
  <line x1="65" y1="728" x2="100" y2="728" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="105" y="732" font-family="monospace" font-size="10" fill="#e65100">= Relation (1-N)</text>
</svg>
